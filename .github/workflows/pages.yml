name: Deploy to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# REQUIRED: Grants permissions to deploy natively via GitHub Actions
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 11 # Installs the latest v11 automatically

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Stable LTS version (Node 26 does not exist yet)
          cache: 'pnpm'

      - name: Configure Git URLs
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://".insteadOf git://

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Project
        run: pnpm build --base=slowroute

      - name: Add NoJekyll Bypass
        run: echo "" > ./dist/.nojekyll

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
